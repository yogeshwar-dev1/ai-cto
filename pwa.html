<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI CTO</title>
  <meta name="theme-color" content="#0f0f0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AI CTO">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; padding: 16px; max-width: 480px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .subtitle { color: #888; font-size: 12px; margin-bottom: 20px; }
    .overall { display: flex; align-items: center; gap: 10px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; }
    .overall-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .overall-text { font-size: 14px; font-weight: 600; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .site-name { font-size: 14px; font-weight: 600; }
    .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
    .badge.up { background: #0d2e1a; color: #4ade80; }
    .badge.down { background: #2e0d0d; color: #f87171; }
    .badge.unknown { background: #2a2a2a; color: #888; }
    .site-url { font-size: 11px; color: #888; margin-bottom: 10px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    .stat { background: #111; border-radius: 8px; padding: 8px 10px; }
    .stat-val { font-size: 16px; font-weight: 700; }
    .stat-lbl { font-size: 10px; color: #888; margin-top: 1px; }
    .green { color: #4ade80; }
    .red { color: #f87171; }
    .refresh-btn { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; color: #fff; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 14px; margin-bottom: 16px; }
    .refresh-btn:active { background: #2a2a2a; }
    .install-btn { width: 100%; background: #4ade80; border: none; color: #000; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700; margin-bottom: 16px; display: none; }
    .loading { color: #888; font-size: 13px; text-align: center; padding: 30px; }
    .bar-wrap { display: flex; gap: 2px; margin-top: 8px; }
    .bar { flex: 1; height: 20px; border-radius: 2px; }
    .bar.up { background: #4ade80; }
    .bar.down { background: #f87171; }
    .bar.unknown { background: #2a2a2a; }
  </style>
</head>
<body>

<button class="install-btn" id="install-btn">📲 Install App</button>

<h1>🤖 AI CTO</h1>
<div class="subtitle" id="last-updated">Loading...</div>

<div class="overall" id="overall">
  <div class="overall-dot" id="overall-dot" style="background:#2a2a2a;"></div>
  <div class="overall-text" id="overall-text">Checking systems...</div>
</div>

<button class="refresh-btn" id="refresh-btn">↻ Refresh</button>

<div id="sites-list"><div class="loading">Loading sites...</div></div>

<script>
  const SUPABASE_URL = "https://ictasxeevrlvjkawuuvm.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdGFzeGVldnJsdmprYXd1dXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODY5MjIsImV4cCI6MjA5MjI2MjkyMn0.3E2wxnBMfu5fiK6KdxIl-sp6h5grNwdaQLd29HHgNfc";

  const headers = {
    "apikey": SUPABASE_KEY,
    "Authorization": `Bearer ${SUPABASE_KEY}`
  };

  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-btn').style.display = 'block';
  });

  document.getElementById('install-btn').addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('install-btn').style.display = 'none';
    }
  });

  async function fetchStats(siteUrl) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/uptime_logs?site_url=eq.${encodeURIComponent(siteUrl)}&order=checked_at.desc&limit=20`, { headers });
    const logs = await res.json();
    if (!logs.length) return { uptime: 100, avg: 0, status: "unknown", history: [] };
    const total = logs.length;
    const up = logs.filter(l => l.status === "up").length;
    const times = logs.filter(l => l.response_time).map(l => l.response_time);
    const avg = times.length ? Math.round(times.reduce((a, b) => a + b, 0) / times.length) : 0;
    return { uptime: Math.round((up/total)*100), avg, status: logs[0]?.status || "unknown", history: logs.reverse() };
  }

  async function loadAll() {
    document.getElementById("last-updated").textContent = "Refreshing...";
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/sites?active=eq.true`, { headers });
      const sites = await res.json();
      const list = document.getElementById("sites-list");
      list.innerHTML = "";

      let allUp = true, anyDown = false;

      for (const site of sites) {
        const stats = await fetchStats(site.url);
        if (stats.status === "down") { allUp = false; anyDown = true; }
        if (stats.status !== "up") allUp = false;

        const bars = stats.history.map(l =>
          `<div class="bar ${l.status}" title="${l.status}"></div>`
        ).join("");

        list.innerHTML += `
          <div class="card">
            <div class="card-top">
              <div class="site-name">${site.name}</div>
              <span class="badge ${stats.status}">${stats.status.toUpperCase()}</span>
            </div>
            <div class="site-url">${site.url}</div>
            <div class="stats">
              <div class="stat">
                <div class="stat-val ${stats.uptime >= 90 ? 'green' : 'red'}">${stats.uptime}%</div>
                <div class="stat-lbl">Uptime</div>
              </div>
              <div class="stat">
                <div class="stat-val">${stats.avg}ms</div>
                <div class="stat-lbl">Avg Speed</div>
              </div>
              <div class="stat">
                <div class="stat-val">${stats.history.length}</div>
                <div class="stat-lbl">Checks</div>
              </div>
            </div>
            <div class="bar-wrap">${bars}</div>
          </div>`;
      }

      const dot = document.getElementById("overall-dot");
      const text = document.getElementById("overall-text");
      if (anyDown) { dot.style.background = "#f87171"; text.innerHTML = '<span class="red">Some Systems Down</span>'; }
      else if (allUp) { dot.style.background = "#4ade80"; text.innerHTML = '<span class="green">All Systems Operational</span>'; }

      document.getElementById("last-updated").textContent = "Updated: " + new Date().toLocaleTimeString();
    } catch(e) {
      console.error("Load error:", e);
      document.getElementById("last-updated").textContent = "Error loading data";
    }
  }

  document.getElementById("refresh-btn").addEventListener("click", loadAll);
  loadAll();
  setInterval(loadAll, 30000);
</script>
</body>
</html>
