<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid #2a2a2a; }
    .logo { font-size: 18px; font-weight: 700; }
    .powered { font-size: 12px; color: #888; }
    .powered a { color: #4ade80; text-decoration: none; }
    .hero { text-align: center; padding: 60px 24px 40px; }
    .hero h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .hero p { color: #888; font-size: 15px; }
    .overall { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 24px auto; max-width: 600px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px 24px; }
    .overall-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .overall-text { font-size: 16px; font-weight: 600; }
    .container { max-width: 700px; margin: 0 auto; padding: 0 24px 80px; }
    .section-title { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; margin-top: 32px; }
    .site-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px 20px; margin-bottom: 10px; }
    .site-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .site-name { font-size: 15px; font-weight: 600; }
    .site-url { font-size: 12px; color: #888; margin-bottom: 10px; }
    .badge { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
    .badge.up { background: #0d2e1a; color: #4ade80; }
    .badge.down { background: #2e0d0d; color: #f87171; }
    .badge.unknown { background: #2a2a2a; color: #888; }
    .bar-wrap { display: flex; gap: 2px; margin-bottom: 6px; }
    .bar { flex: 1; height: 28px; border-radius: 3px; cursor: pointer; transition: opacity 0.2s; }
    .bar:hover { opacity: 0.8; }
    .bar.up { background: #4ade80; }
    .bar.down { background: #f87171; }
    .bar.unknown { background: #2a2a2a; }
    .bar-labels { display: flex; justify-content: space-between; font-size: 11px; color: #888; }
    .uptime-pct { font-size: 12px; color: #4ade80; font-weight: 600; }
    .incident-card { background: #2e0d0d; border: 1px solid #f87171; border-radius: 12px; padding: 16px 20px; margin-bottom: 10px; }
    .incident-title { font-size: 14px; font-weight: 600; color: #f87171; margin-bottom: 4px; }
    .incident-meta { font-size: 12px; color: #888; }
    .loading { color: #888; font-size: 14px; text-align: center; padding: 40px; }
    .last-updated { text-align: center; font-size: 12px; color: #888; margin-top: 24px; }
    .not-found { text-align: center; padding: 80px 24px; }
    .not-found h2 { font-size: 24px; margin-bottom: 12px; }
    .not-found p { color: #888; margin-bottom: 24px; }
    .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; border: none; background: #4ade80; color: #000; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>

<nav>
  <div class="logo" id="page-title">🤖 Status Page</div>
  <div class="powered">Powered by <a href="https://ai-cto.onrender.com">AI CTO</a></div>
</nav>

<div id="main-content">
  <div class="loading">Loading status page...</div>
</div>

<script>
  const SUPABASE_URL = "https://ictasxeevrlvjkawuuvm.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljdGFzeGVldnJsdmprYXd1dXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODY5MjIsImV4cCI6MjA5MjI2MjkyMn0.3E2wxnBMfu5fiK6KdxIl-sp6h5grNwdaQLd29HHgNfc";

  const headers = {
    "apikey": SUPABASE_KEY,
    "Authorization": `Bearer ${SUPABASE_KEY}`
  };

  // Get username from URL
  // Supports: /status.html?u=username OR /status/username
  function getUsername() {
    const params = new URLSearchParams(window.location.search);
    if (params.get("u")) return params.get("u");
    const path = window.location.pathname;
    const match = path.match(/\/status\/(.+)/);
    if (match) return match[1];
    return null;
  }

  async function getUserByUsername(username) {
    // First try exact email match
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/users_meta?or=(email.ilike.*${username}*,name.ilike.*${username}*)&limit=1`,
      { headers }
    );
    const data = await res.json();
    return data && data.length ? data[0] : null;
  }

  async function fetchSites(userId) {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/sites?user_id=eq.${userId}&active=eq.true&order=created_at.asc`,
      { headers }
    );
    return res.json();
  }

  async function fetchHistory(siteUrl) {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/uptime_logs?site_url=eq.${encodeURIComponent(siteUrl)}&order=checked_at.desc&limit=90`,
      { headers }
    );
    return res.json();
  }

  async function fetchIncidents(userId) {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/incidents?status=neq.resolved&order=created_at.desc&limit=5`,
      { headers }
    );
    return res.json();
  }

  function renderBars(logs) {
    if (!logs.length) return '<div style="color:#888;font-size:12px;">No data yet</div>';
    const reversed = [...logs].reverse();
    return reversed.map(l => `
      <div class="bar ${l.status}" title="${new Date(l.checked_at).toLocaleString()} — ${l.status}"></div>
    `).join("");
  }

  async function loadPage() {
    const username = getUsername();
    const main = document.getElementById("main-content");

    if (!username) {
      main.innerHTML = `
        <div class="not-found">
          <h2>👋 Welcome to AI CTO Status</h2>
          <p>Visit your personal status page at:</p>
          <p style="color:#4ade80;font-size:16px;margin:16px 0;">status.html?u=yourusername</p>
          <a href="auth.html" class="btn">Create Free Account</a>
        </div>`;
      return;
    }

    // Find user
    const user = await getUserByUsername(username);
    if (!user) {
      main.innerHTML = `
        <div class="not-found">
          <h2>😕 Status page not found</h2>
          <p>No user found for "<strong>${username}</strong>"</p>
          <br>
          <a href="auth.html" class="btn">Create Your Own</a>
        </div>`;
      return;
    }

    document.getElementById("page-title").textContent = `🤖 ${user.name}'s Status`;
    document.title = `${user.name} — Status Page`;

    const sites = await fetchSites(user.id);
    const incidents = await fetchIncidents(user.id);

    if (!sites.length) {
      main.innerHTML = `
        <div class="hero">
          <h1>${user.name}'s Status Page</h1>
          <p>No sites being monitored yet.</p>
        </div>`;
      return;
    }

    // Check overall status
    let allUp = true;
    let anyDown = false;
    const siteData = [];

    for (const site of sites) {
      const logs = await fetchHistory(site.url);
      const total = logs.length;
      const up = logs.filter(l => l.status === "up").length;
      const uptime = total ? Math.round((up / total) * 100) : 100;
      const status = logs.length ? logs[0].status : "unknown";
      if (status === "down") { allUp = false; anyDown = true; }
      if (status !== "up") allUp = false;
      siteData.push({ site, logs, uptime, status });
    }

    const overallColor = anyDown ? "#f87171" : "#4ade80";
    const overallText = anyDown ? "Some systems are experiencing issues" : "All systems operational";

    let html = `
      <div class="hero">
        <h1>${user.name}'s Status Page</h1>
        <p>Real-time monitoring powered by AI CTO</p>
      </div>

      <div class="container">
        <div class="overall">
          <div class="overall-dot" style="background:${overallColor};"></div>
          <div class="overall-text" style="color:${overallColor};">${overallText}</div>
        </div>
    `;

    // Active incidents
    if (incidents && incidents.length) {
      html += `<div class="section-title">🚨 Active Incidents</div>`;
      incidents.forEach(i => {
        html += `
          <div class="incident-card">
            <div class="incident-title">${i.title}</div>
            <div class="incident-meta">${i.description || ""} · ${new Date(i.created_at).toLocaleString()}</div>
          </div>`;
      });
    }

    // Sites
    html += `<div class="section-title">🌐 Systems</div>`;
    siteData.forEach(({ site, logs, uptime, status }) => {
      html += `
        <div class="site-card">
          <div class="site-top">
            <div class="site-name">${site.name}</div>
            <span class="badge ${status}">${status === "up" ? "✓ Operational" : status === "down" ? "✗ Down" : "? Unknown"}</span>
          </div>
          <div class="site-url">${site.url}</div>
          <div class="bar-wrap">${renderBars(logs)}</div>
          <div class="bar-labels">
            <span>90 days ago</span>
            <span class="uptime-pct">${uptime}% uptime</span>
            <span>Today</span>
          </div>
        </div>`;
    });

    html += `
        <div class="last-updated">Last updated: ${new Date().toLocaleTimeString()} · Auto-refreshes every 30s</div>
      </div>`;

    main.innerHTML = html;
    setTimeout(loadPage, 30000);
  }

  loadPage();
</script>
</body>
</html>
